<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="c-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#f472b6" />
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');
      .text { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 200px; letter-spacing: -10px; }
      .bg { fill: #f4f4f5; rx: 120; }
      .ye-text { fill: #09090b; }
      .dot { fill: #a1a1aa; }
      
      @media (prefers-color-scheme: dark) {
        .bg { fill: #09090b; }
        .ye-text { fill: #ffffff; }
        .dot { fill: #52525b; }
      }
    </style>
  </defs>
  <rect class="bg" width="512" height="512" />
  <text x="50%" y="54%" text-anchor="middle" dominant-baseline="middle" class="text">
    <tspan class="ye-text">YE</tspan><tspan fill="url(#c-grad)">C</tspan><tspan class="dot" dx="-5">.</tspan>
  </text>
</svg>
